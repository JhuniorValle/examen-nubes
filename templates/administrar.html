<!DOCTYPE html>
<html>
<head>
    <title>Administrar</title>
</head>
<body>

<h2>Lista de Personas</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>DNI</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Acción</th>
    </tr>

    {% for p in personas %}
    <tr>
        <td>{{p[0]}}</td>
        <td>{{p[1]}}</td>
        <td>{{p[2]}}</td>
        <td>{{p[3]}}</td>
        <td>
            <a href="/eliminar/{{p[0]}}">Eliminar</a>
        </td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/">Volver</a>

</body>
</html>
